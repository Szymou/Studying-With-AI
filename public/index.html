<body>

    <script>
        let token = localStorage.getItem('token');
        let currentUser = null;
        let currentAiQuestionId = null;
        let currentAiQuestionText = null;
        let aiAnswers = [];      // еӨҡзӯ”жЎҲзј“еӯҳ [{text, ts}]
        let currentAbortController = null;
        // ---- еӨҡйўҶеҹҹж”ҜжҢҒ ----
        let currentDomain = { code: 'java', name: 'Java', icon: 'вҳ•' };
        let domains = [];

        async function updateStats() {
            try {
                const s = await api('GET', '/api/questions/progress/stats?domain=' + encodeURIComponent(currentDomain.code));
                document.getElementById('statAttempted').textContent = s.total_attempted || 0;
                const hideInp = localStorage.getItem('hidePracticeInput') === 'true';
                if (hideInp) {
                    document.getElementById('statCorrectDiv').style.display = 'none';
                    document.getElementById('statAccuracyDiv').style.display = 'none';
                } else {
                    document.getElementById('statCorrectDiv').style.display = 'block';
                    document.getElementById('statAccuracyDiv').style.display = 'block';
                    document.getElementById('statCorrect').textContent = s.correct_count || 0;
                    document.getElementById('statAccuracy').textContent = (s.accuracy || 0) + '%';
                }
            } catch (e) {
                console.error('жӣҙж–°з»ҹи®ЎеӨұиҙҘ', e);
            }
        }

        async function loadDomains() {
            try {
                domains = await api('GET', '/api/domains');
                // д»Һ localStorage жҒўеӨҚжҺ’еәҸ
                const savedOrder = localStorage.getItem('domainOrder');
                if (savedOrder) {
                    try {
                        const order = JSON.parse(savedOrder);
                        if (Array.isArray(order)) {
                            domains.sort((a, b) => order.indexOf(a.code) - order.indexOf(b.code));
                        }
                    } catch(e) {}
                }
                renderSidebar();
                const d = domains.find(d => d.code === currentDomain.code);
                if (d) currentDomain = d;
                document.getElementById('currentDomainTitle').textContent = (currentDomain.icon || 'рҹ“ҡ') + ' ' + currentDomain.name + ' еӯҰд№ ';
                await updateStats();
            } catch(e) {
                console.error('еҠ иҪҪйўҶеҹҹеҲ—иЎЁеӨұиҙҘ', e);
            }
        }

        async function switchDomain(code) {
            const d = domains.find(d => d.code === code);
            if (!d) return;
            currentDomain = d;
            document.getElementById('currentDomainTitle').textContent = (d.icon || 'рҹ“ҡ') + ' ' + d.name + ' еӯҰд№ ';
            renderSidebar();
            window._prac = null;
            await updateStats();
            const activeTab = document.querySelector('.nav-btn.active');
            if (activeTab) {
                loadTab(activeTab.dataset.tab || 'practice');
            } else {
                loadTab('practice');
            }
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            let html = '<div class="sidebar-header">жҠҖжңҜйўҶеҹҹ</div>';
            for (const d of domains) {
                const active = d.code === currentDomain.code ? 'active' : '';
                html += '<div class="sidebar-item ' + active + '" draggable="true" data-code="' + d.code + '" onclick="switchDomain(\'' + d.code + '\')">' +
                    '<span class="icon">' + (d.icon || 'рҹ“ҡ') + '</span>' +
                    '<span>' + d.name + '</span></div>';
            }
            
            // жҠҠAIе’ЁиҜўе’Ңи®ҫзҪ®д№ҹж”ҫеҲ°еә•йғЁ
            html += '<div style="margin-top:auto;">';
            html += '<div class="sidebar-item" onclick="showGenerateDomainModal()" style="margin-top:8px;">' +
                '<span class="icon">вңЁ</span><span>з”ҹжҲҗж–°йўҶеҹҹ</span></div>';
            html += '<div class="sidebar-item" onclick="loadTab(\'ai-chat\')" style="margin-top:4px;">' +
                '<span class="icon">рҹӨ–</span><span>AI е’ЁиҜў</span></div>';
            html += '<div class="sidebar-item" onclick="loadTab(\'settings\')">' +
                '<span class="icon">вҡҷпёҸ</span><span>и®ҫзҪ®</span></div>';
            html += '</div>';
            
            sidebar.innerHTML = html;
        }

        // ---- дҫ§иҫ№ж ҸжӢ–жӢүжҺ’еәҸ ----
        let _dragCode = null;
        let _recallMode = localStorage.getItem('recallMode') === 'true';
        let _interleaveMode = localStorage.getItem('interleaveMode') === 'true';

          const API_BASE = window.location.protocol + '//' + window.location.host;

              if (body) opts.body = JSON.stringify(body);
              let url = API_BASE + path;

                  const separator = path.includes('?') ? '&' : '?';
                  url += separator + 'domain=' + currentDomain.code;
              }
              const r = await fetch(url, opts);
              if (r.status === 401) { logout(); throw new Error('иҜ·йҮҚж–°зҷ»еҪ•'); }
              return r.json();
          }

        function renderMd(c) {
            const html = typeof marked !== 'undefined' ? marked.parse(c) : c.replace(/\n/g, '<br>');
            // з»ҷд»Јз Ғеқ—еҠ еӨҚеҲ¶жҢүй’®
            return html.replace(/<pre><code class="([^"]*)">/g, '<div style="position:relative;"><button class="code-copy-btn" onclick="copyCode(this)" title="еӨҚеҲ¶д»Јз Ғ">рҹ“Ӣ</button><pre><code class="$1">')
                .replace(/<pre><code>/g, '<div style="position:relative;"><button class="code-copy-btn" onclick="copyCode(this)" title="еӨҚеҲ¶д»Јз Ғ">рҹ“Ӣ</button><pre><code>')
                .replace(/<\/code><\/pre>/g, '</code></pre></div>');
        }
        function copyCode(btn) {
            const code = btn.parentElement.querySelector('code');
            if (!code) return;
            const text = code.textContent || '';
            // еүӘиҙҙжқҝ API еңЁйқһ HTTPS дёӢдёҚеҸҜз”ЁпјҢйңҖе…ҲжЈҖжҹҘ
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    btn.textContent = 'вң…';
                    setTimeout(() => { btn.textContent = 'рҹ“Ӣ'; }, 1500);
                }).catch(() => fallbackCopy(code, btn));
            } else {
                fallbackCopy(code, btn);
            }
        }
        function fallbackCopy(code, btn) {
            const range = document.createRange();
            range.selectNodeContents(code);
            const sel = window.getSelection();
            sel.removeAllRanges(); sel.addRange(range);
            document.execCommand('copy');
            sel.removeAllRanges();
            btn.textContent = 'вң…';
            setTimeout(() => { btn.textContent = 'рҹ“Ӣ'; }, 1500);
        }

        function dragModalStart(e) {
            if (e.target.tagName !== 'H2') return;
            const box = document.getElementById('aiModalContentBox');
            const rect = box.getBoundingClientRect();
            window._dragData = { offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top, box };
            document.addEventListener('mousemove', dragModalMove);
            document.addEventListener('mouseup', dragModalEnd);
            e.preventDefault();
        }
        function dragModalMove(e) {
            if (!window._dragData) return;
            const { offsetX, offsetY, box } = window._dragData;
            let x = e.clientX - offsetX;
            let y = e.clientY - offsetY;
            x = Math.max(0, Math.min(window.innerWidth - box.offsetWidth, x));
            y = Math.max(0, Math.min(window.innerHeight - box.offsetHeight, y));
            box.style.left = x + 'px';
            box.style.top = y + 'px';
            box.style.transform = 'none';
        }
        function dragModalEnd() {
            window._dragData = null;
            document.removeEventListener('mousemove', dragModalMove);
            document.removeEventListener('mouseup', dragModalEnd);
        }

        // еҲӨж–ӯеҶ…е®№жҳҜеҗҰзңӢиө·жқҘе®Ңж•ҙ
        function isContentComplete(text) {
            if (!text || text.length < 50) return false;
            const ends = ['.', 'гҖӮ', '!', 'пјҒ', '?', 'пјҹ', ']', 'гҖ‘', '}', ')', '>'];
            const trimmed = text.trim();
            for (const end of ends) {
                if (trimmed.endsWith(end)) return true;
            }
            // жЈҖжҹҘжҳҜеҗҰжңүжҳҺжҳҫзҡ„жңӘе®ҢжҲҗж Үи®°
            const incompleteMarks = ['...', 'вҖҰ', 'жңӘе®Ң', 'еҫ…з»ӯ', 'з»§з»ӯ', 'to be continued'];
            for (const mark of incompleteMarks) {
                if (text.toLowerCase().includes(mark)) return false;
            }
            return text.length > 300; // еҶ…е®№иҫғй•ҝж—¶й»ҳи®Өи®Өдёәе®Ңж•ҙ
        }

        // TTS жң—иҜ»

        function loadVoices() {

            select.innerHTML = '<option value="">й»ҳи®Ө</option>' + cnVoices.map((v, i) => {

            }).join('');
            select.style.display = cnVoices.length ? '' : 'none';

        function speakAI() {
            const contentEl = document.getElementById('aiModalContent');
            const btn = document.getElementById('aiSpeakBtn');
            if (!contentEl || !btn) return;
            if (_speaking) {
                window.speechSynthesis?.cancel();
                _speaking = false;
                btn.textContent = 'рҹ”Ҡ жң—иҜ»';
                return;
            }
            const text = contentEl.textContent || contentEl.innerText || '';
            if (!text || text === 'AIжҖқиҖғдёӯ...') return;

            // еҠ иҪҪеҸҜз”ЁиҜӯйҹіе№¶жҳҫзӨәйҖүжӢ©еҷЁпјҲйҰ–ж¬Ўпјү
            const select = document.getElementById('aiVoiceSelect');
            if (select && !select.options.length) loadVoices();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.0;

            // дҪҝз”ЁйҖүдёӯзҡ„иҜӯйҹі
            if (select && select.value) {
                const voices = window.speechSynthesis?.getVoices() || [];
                const idx = parseInt(select.value);
                if (voices[idx]) {
                    utterance.voice = voices[idx];
                    localStorage.setItem('ttsVoice', select.value);
                }
            }

            // дҪҝз”ЁйҖүдёӯзҡ„иҜӯйҖҹ
            const speedSelect = document.getElementById('aiSpeedSelect');
            if (speedSelect) {
                utterance.rate = parseFloat(speedSelect.value) || 1.0;
                localStorage.setItem('ttsSpeed', speedSelect.value);
            }

            utterance.onstart = () => { _speaking = true; btn.textContent = 'вҸ№пёҸ еҒңжӯў'; };
            utterance.onend = () => { _speaking = false; btn.textContent = 'рҹ”Ҡ жң—иҜ»'; };
            utterance.onerror = () => { _speaking = false; btn.textContent = 'рҹ”Ҡ жң—иҜ»'; };
            window.speechSynthesis?.speak(utterance);
        }

        // еҒңжӯўиҪ®иҜў
        function stopAIPolling() {

            }
        }

        // жЈҖжҹҘзӯ”жЎҲжҳҜеҗҰе®ҢжҲҗпјҲжңү[AI_COMPLETED]ж Үи®°пјү
        function isAnswerComplete(answer) {
            return answer && answer.includes('[AI_COMPLETED]');
        }
        
        // жҳҫзӨәзӯ”жЎҲеүҚпјҢе…ҲеҺ»жҺүе®ҢжҲҗж Үи®°
        function cleanAnswerForDisplay(answer) {
            if (!answer) return answer;
            return answer.replace(/\s*\[AI_COMPLETED\]\s*$/g, '');
        }
        
        async function fetchAIAnswer(qid, qText, ua, force) {
            // е…ҲеҒңжӯўд№ӢеүҚеҸҜиғҪеӯҳеңЁзҡ„иҪ®иҜў
            stopAIPolling();
            
            currentAiQuestionId = qid;
            currentAiQuestionText = qText;
            // е…ҲжҹҘжңҚеҠЎз«Ҝзј“еӯҳпјҲйҷӨйқһејәеҲ¶еҲ·ж–°пјү
            if (!force) {
                try {
                    const resp = await api('GET', '/api/ai/cache/' + qid);
                    if (resp && resp.answer) {
                        // жҳҫзӨәеүҚе…Ҳжё…зҗҶж Үи®°
                        aiAnswers = [{ text: cleanAnswerForDisplay(resp.answer), ts: Date.now() }];
                        renderAiModal();
                        
                        // еҰӮжһңзӯ”жЎҲжІЎе®ҢжҲҗпјҢе°ұдёҖзӣҙиҪ®иҜўеҲ·ж–°пјҒ
                        if (!isAnswerComplete(resp.answer)) {
                            // еҗҜеҠЁжҜҸ500msзҡ„иҪ®иҜў
                            aiPollingInterval = setInterval(async () => {
                                try {
                                    const pollResp = await api('GET', '/api/ai/cache/' + qid);
                                    if (pollResp && pollResp.answer) {
                                        // жӣҙж–°жҳҫзӨәжңҖж–°зӯ”жЎҲ
                                        if (cleanAnswerForDisplay(pollResp.answer) !== aiAnswers[aiAnswers.length - 1].text) {
                                            aiAnswers = [{ text: cleanAnswerForDisplay(pollResp.answer), ts: Date.now() }];
                                            renderAiModal();
                                        }
                                        
                                        // жЈҖжҹҘжҳҜеҗҰе®ҢжҲҗдәҶпјҢе®ҢжҲҗе°ұеҒңжӯўиҪ®иҜў
                                        if (isAnswerComplete(pollResp.answer)) {
                                            stopAIPolling();
                                        }
                                    }
                                } catch (e) {
                                    console.error('Polling error:', e);
                                }
                            }, 500);
                        }
                        
                        return resp.answer;
                    }
                } catch(e) {
                    console.error('Fetch cache error:', e);
                }
            }

            openAiModal('рҹӨ– AIжҖқиҖғдёӯ...', false);
            if (currentAbortController) currentAbortController.abort();
            currentAbortController = new AbortController();
            const signal = currentAbortController.signal;
            try {
                const r = await fetch(API_BASE + '/api/ai/ask', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ question: qText, userAnswer: ua || '', questionId: qid, tech_domain: currentDomain.code }),
                    signal
                });
                if (!r.ok) throw new Error('иҜ·жұӮеӨұиҙҘ (' + r.status + ')');
                const reader = r.body.getReader();
                const dec = new TextDecoder();
                let full = '', buf = '', first = true;
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buf += dec.decode(value, { stream: true });
                    const lines = buf.split('\n');
                    buf = lines.pop() || '';
                    for (const ln of lines) {
                        const s = ln.trim();
                        if (!s.startsWith('data: ')) continue;
                        const d = s.slice(6).trim();
                        if (d === '[DONE]') continue;
                        try {
                            const p = JSON.parse(d);
                            if (p.content) {
                                full += p.content;
                                if (first) { openAiModal('', false); first = false; }
                                document.getElementById('aiModalContent').innerHTML = renderMd(full);
                                const hasContent = !!full;
                                document.getElementById('aiSpeakBtn').style.display = hasContent ? '' : 'none';
                                if (hasContent) {
                                    document.getElementById('aiVoiceSelect').style.display = (window.speechSynthesis?.getVoices()?.length || 0) > 0 ? '' : 'none';
                                    document.getElementById('aiSpeedSelect').style.display = '';
                                    loadVoices();
                                }
                            } else if (p.error && !full) {
                                throw new Error(p.error);
                            }
                        } catch(e) {}
                    }
                }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            const diff = now - d;
            if (diff < 60000) return 'еҲҡеҲҡ';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'еҲҶй’ҹеүҚ';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'е°Ҹж—¶еүҚ';
            if (diff < 2592000000) return Math.floor(diff / 86400000) + 'еӨ©еүҚ';
            return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        async function doAIGenerate() {
            const topic = document.getElementById('genTopic').value;
            const count = parseInt(document.getElementById('genCount').value) || 5;
            if (!topic) { toast('иҜ·иҫ“е…Ҙдё»йўҳ', 'вҡ пёҸ'); return; }
            const res = document.getElementById('genResult');
            res.innerHTML = '<span class="loading">рҹӨ– AIз”ҹжҲҗдёӯ...</span><div id="genStreamContent" style="margin-top:10px;padding:10px;background:var(--surface-secondary);border-radius:8px;white-space:pre-wrap;font-family:monospace;font-size:13px;max-height:300px;overflow-y:auto;"></div>';
            const streamContent = document.getElementById('genStreamContent');
            let fullContent = '';
            
            try {
                const response = await fetch(API_BASE + '/api/ai/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ topic, count, saveToCustom: true, tech_domain: currentDomain.code })
                });
                
                if (!response.ok) throw new Error('иҜ·жұӮеӨұиҙҘ');
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const dataStr = line.slice(6).trim();
                        if (dataStr === '[DONE]') continue;
                        
                        try {
                            const data = JSON.parse(dataStr);
                            
                            if (data.type === 'content') {
                                fullContent += data.content;
                                streamContent.textContent = fullContent;
                                streamContent.scrollTop = streamContent.scrollHeight;
                            } else if (data.type === 'done') {
                                if (data.parsed) {
                                    res.innerHTML = '<div style="color:#48bb78;">вң… жҲҗеҠҹз”ҹжҲҗ ' + data.count + ' йўҳпјҢе·ІдҝқеӯҳеҲ°иҮӘе®ҡд№үйўҳеә“</div><pre style="font-size:12px;background:var(--surface-secondary);padding:10px;margin-top:5px;overflow:auto;white-space:pre-wrap;">' + JSON.stringify(data.questions, null, 2) + '</pre>';
                                    toast('AIз”ҹжҲҗдәҶ ' + data.count + ' йўҳ', 'вң…');
                                    setTimeout(() => { document.getElementById('aiGenForm')?.remove(); loadManage(); }, 1500);
                                } else {
                                    res.innerHTML = '<div style="color:#ed8936;">вҡ пёҸ AIиҝ”еӣһж јејҸејӮеёёпјҢиҜ·йҮҚиҜ•</div><pre style="font-size:12px;background:var(--surface-secondary);padding:10px;margin-top:5px;overflow:auto;">' + (data.raw || '') + '</pre>';
                                    toast('AIиҝ”еӣһж јејҸејӮеёёпјҢе·ІиҮӘеҠЁеҲ·ж–°', 'вҡ пёҸ');
                                    setTimeout(() => { document.getElementById('aiGenForm')?.remove(); loadManage(); }, 1500);
                                }
                            } else if (data.type === 'error') {
                                res.innerHTML = '<div style="color:#e53e3e;">вқҢ з”ҹжҲҗеӨұиҙҘпјҡ' + data.content + '</div>';
                                toast('з”ҹжҲҗеӨұиҙҘпјҡ' + data.content, 'вқҢ');
                                setTimeout(() => { document.getElementById('aiGenForm')?.remove(); loadManage(); }, 2000);
                            }
                        } catch (e) {}
                    }
                }
            } catch (e) {
                res.innerHTML = '<div style="color:#e53e3e;">вқҢ з”ҹжҲҗеӨұиҙҘпјҡ' + e.message + '</div>';
            }
        }

        async function sendChat() {
            const inp = document.getElementById('aiInp');
            const msg = inp.value.trim();
            if (!msg) return;
            const msgs = document.getElementById('aiMsgs');
            const ph = msgs.querySelector('.empty-state'); if (ph) ph.remove();
            const ud = document.createElement('div'); ud.className = 'ai-msg user'; ud.innerHTML = '<div class="role">дҪ </div>' + msg; msgs.appendChild(ud);
            inp.value = ''; inp.disabled = true;
            const ad = document.createElement('div'); ad.className = 'ai-msg assistant'; ad.innerHTML = '<div class="role">AI</div><span class="loading">жҖқиҖғдёӯ...</span>'; msgs.appendChild(ad);
            msgs.scrollTop = msgs.scrollHeight;
            try {
                let convoId = window._aiConvoId;
                if (!convoId) {
                    const newC = await api('POST', '/api/ai/chat/new', { title: msg.substring(0, 30), tech_domain: currentDomain.code });
                    convoId = newC.id;
                    window._aiConvoId = convoId;
                }
                // SSE жөҒејҸиҜ·жұӮ
                const r = await fetch(API_BASE + '/api/ai/chat/' + convoId + '/message/stream', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ message: msg, tech_domain: currentDomain.code })
                });
                if (!r.ok) throw new Error('иҜ·жұӮеӨұиҙҘ (' + r.status + ')');
                const reader = r.body.getReader();
                const dec = new TextDecoder();
                let full = '', buf = '', first = true;
                let _chatReadOffset = 0;
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buf += dec.decode(value, { stream: true });
                    const lines = buf.split('\n');
                    buf = lines.pop() || '';
                    for (const ln of lines) {
                        const s = ln.trim();
                        if (!s.startsWith('data: ')) continue;
                        const d = s.slice(6).trim();
                        if (d === '[DONE]') continue;
                        try {
                            const p = JSON.parse(d);
                            if (p.content) {
                                full += p.content;
                                if (first) { ad.innerHTML = '<div class="role">AI</div>'; first = false; }
                                ad.innerHTML = '<div class="role">AI</div>' + renderMd(full);
                                msgs.scrollTop = msgs.scrollHeight;
                                // еҚіеҲ»жң—иҜ»еўһйҮҸеҶ…е®№
                                if (localStorage.getItem('chatTTS') === 'true') {
                                    const plain = full.replace(/<[^>]+>/g, '');
                                    const newText = plain.slice(_chatReadOffset);
                                    if (newText.length > 5) { // иҮіе°‘ 5 дёӘеӯ—еҶҚиҜ»
                                        const speedSel = document.getElementById('chatSpeedSelect');
                                        const rate = speedSel ? parseFloat(speedSel.value) || 1.0 : 1.0;
                                        const utterance = new SpeechSynthesisUtterance(newText);
                                        utterance.lang = 'zh-CN';
                                        utterance.rate = rate;
                                        const savedVoice = localStorage.getItem('ttsVoice');
                                        if (savedVoice) {
                                            const voices = window.speechSynthesis?.getVoices() || [];
                                            const idx = parseInt(savedVoice);
                                            if (voices[idx]) utterance.voice = voices[idx];
                                        }
                                        window.speechSynthesis?.speak(utterance);
                                        _chatReadOffset = plain.length;
                                    }
                                }
                            } else if (p.error) {
                                ad.innerHTML = '<div class="role">AI</div>вҡ пёҸ ' + p.error;
                            }
                        } catch(e) {}
                    }
                }
                if (!full) ad.innerHTML = '<div class="role">AI</div>вҡ пёҸ жңӘж”¶еҲ°жңүж•ҲеӣһеӨҚ';
            } catch(e) { ad.innerHTML = '<div class="role">AI</div>вҡ пёҸ ' + e.message; }
            finally { inp.disabled = false; inp.focus(); }
        }

            btn.innerText = 'рҹӨ– жҖқиҖғдёӯ...';
            
            try {
                const question = 'ж №жҚ®д»ҘдёӢжҸҸиҝ°пјҢдёәжҲ‘з”ҹжҲҗдёҖдёӘжҠҖжңҜйўҶеҹҹзҡ„дҝЎжҒҜпјҡ' + description + '\n\nиҜ·дёҘж јиҝ”еӣһJSONж јејҸпјҢеҢ…еҗ«д»ҘдёӢеӯ—ж®өпјҡnameпјҲйўҶеҹҹеҗҚз§°пјүгҖҒcodeпјҲд»Јз Ғж ҮиҜҶпјҢе…Ёе°ҸеҶҷиӢұж–ҮпјүгҖҒiconпјҲдёҖдёӘemojiеӣҫж ҮпјүгҖҒdescriptionпјҲз®ҖзҹӯжҸҸиҝ°пјҢдёҚи¶…иҝҮ50еӯ—пјүгҖӮеҸӘиҝ”еӣһJSONпјҢдёҚиҰҒе…¶д»–ж–Үеӯ—гҖӮ';
                
                let fullAnswer = '';
                
                const res = await fetch(API_BASE + '/api/ai/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ question })
                });
                
                if (!res.ok) throw new Error('иҜ·жұӮеӨұиҙҘ');
                
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const dataStr = line.slice(6).trim();
                        if (dataStr === '[DONE]') continue;
                        
                        try {
                            const data = JSON.parse(dataStr);
                            if (data.content || data.text || data.answer) {
                                fullAnswer += data.content || data.text || data.answer || '';
                            } else if (data.choices && data.choices[0] && data.choices[0].delta) {
                                fullAnswer += data.choices[0].delta.content || '';
                            }
                        } catch(e) {
                            // еҝҪз•Ҙи§Јжһҗй”ҷиҜҜ
                        }
                    }
                }
                
                // и§ЈжһҗAIиҝ”еӣһзҡ„JSON
                let aiData;
                try {
                    // е°қиҜ•жҸҗеҸ–JSON
                    const jsonMatch = fullAnswer.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        aiData = JSON.parse(jsonMatch[0]);
                    } else {
                        aiData = JSON.parse(fullAnswer);
                    }
                } catch(e) {
                    toast('AIиҝ”еӣһж јејҸејӮеёёпјҢиҜ·жүӢеҠЁеЎ«еҶҷ', 'вҡ пёҸ');
                    return;
                }
                
                if (aiData.name) document.getElementById('domainName').value = aiData.name;
                if (aiData.code) document.getElementById('domainCode').value = aiData.code;
                if (aiData.icon) document.getElementById('domainIcon').value = aiData.icon;
                toast('AIе·Іе»әи®®е®ҢжҲҗпјҒ', 'вң…');
            } catch(e) {
                toast('AIе»әи®®еӨұиҙҘпјҡ' + e.message, 'вқҢ');
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        function closeGenerateDomainModal() {
            const modal = document.getElementById('generateDomainModal');
            if (modal) modal.remove();
            if (window._escHandler) {
                document.removeEventListener('keydown', window._escHandler);
                delete window._escHandler;
            }
        }

        async function generateNewDomain() {
            const description = document.getElementById('domainDescription').value.trim();
            const name = document.getElementById('domainName').value.trim();
            const code = document.getElementById('domainCode').value.trim();
            const icon = document.getElementById('domainIcon').value.trim();
            const numQuestions = parseInt(document.getElementById('domainQuestions').value) || 5;

            if (!description) {
                toast('иҜ·иҫ“е…ҘйўҶеҹҹжҸҸиҝ°', 'вҡ пёҸ');
                return;
            }

            const btn = document.getElementById('btnGenerateDomain');
            const progress = document.getElementById('generateProgress');
            const progressText = document.getElementById('progressText');

            btn.disabled = true;
            btn.textContent = 'з”ҹжҲҗдёӯ...';
            progress.style.display = 'block';
            progressText.innerHTML = 'рҹ”Қ еҲҶжһҗйўҶеҹҹдҝЎжҒҜ...<br><small style="color:#94a3b8;" id="genDomainStream"></small>';
            document.getElementById('genDomainStream').textContent = '';

            try {
                const r = await fetch(API_BASE + '/api/ai/generate-domain', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ description, language: name || undefined, code: code || undefined, icon: icon || undefined, numQuestions })
                });

                if (!r.ok) {
                    const err = await r.json().catch(() => ({ message: 'иҜ·жұӮеӨұиҙҘ' }));
                    throw new Error(err.message || 'иҜ·жұӮеӨұиҙҘ');
                }

                const reader = r.body.getReader();
                const dec = new TextDecoder();
                let buf = '';
                let streamContent = '';
                let doneDomain = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buf += dec.decode(value, { stream: true });
                    const lines = buf.split('\n');
                    buf = lines.pop() || '';
                    for (const ln of lines) {
                        const s = ln.trim();
                        if (!s.startsWith('data: ')) continue;
                        const d = s.slice(6).trim();
                        if (d === '[DONE]') continue;
                        try {
                            const p = JSON.parse(d);
                            if (p.type === 'step') {
                                progressText.innerHTML = p.content + '<br><small style="color:#94a3b8;" id="genDomainStream"></small>';
                            } else if (p.type === 'domain') {
                                doneDomain = p.domain;
                            } else if (p.type === 'stream') {
                                streamContent += (p.content || '');
                                document.getElementById('genDomainStream').textContent = streamContent.slice(-200);
                            } else if (p.type === 'done') {
                                const domain = p.domain || doneDomain;
                                if (domain && p.saved > 0) {
                                    progressText.innerHTML = 'вң… жҲҗеҠҹпјҒеҲӣе»әдәҶ ' + domain.name + ' йўҶеҹҹпјҢдҝқеӯҳдәҶ ' + p.saved + ' йҒ“йўҳзӣ®';
                                    toast('жҲҗеҠҹз”ҹжҲҗ ' + domain.name + ' йўҶеҹҹпјҒ', 'вң…');
                                    await loadDomains();
                                    loadDomainsList();
                                    await switchDomain(domain.code);
                                    setTimeout(() => closeGenerateDomainModal(), 2000);
                                } else if (domain) {
                                    progressText.innerHTML = 'вң… йўҶеҹҹе·ІеҲӣе»әпјҢдҪҶйўҳзӣ®и§ЈжһҗеӨұиҙҘпјҲ' + (p.parseError ? 'ж јејҸејӮеёё' : 'з”ҹжҲҗдёӯж–ӯ') + 'пјүпјҢиҜ·жүӢеҠЁж·»еҠ йўҳзӣ®';
                                    toast('йўҶеҹҹе·ІеҲӣе»әпјҢдҪҶйўҳзӣ®з”ҹжҲҗйңҖжүӢеҠЁеӨ„зҗҶ', 'вҡ пёҸ');
                                    await loadDomains();
                                    loadDomainsList();
                                    await switchDomain(domain.code);
                                    setTimeout(() => closeGenerateDomainModal(), 2000);
                                } else {
                                    progressText.innerHTML = 'вқҢ з”ҹжҲҗеӨұиҙҘ';
                                }
                            } else if (p.type === 'error') {
                                progressText.innerHTML = 'вқҢ ' + (p.content || 'з”ҹжҲҗеӨұиҙҘ');
                            }
                        } catch (e) {}
                    }
                }
            } catch(e) {
                progressText.innerHTML = 'вқҢ з”ҹжҲҗеӨұиҙҘпјҡ' + e.message;
                toast('з”ҹжҲҗеӨұиҙҘ', 'вқҢ');
            } finally {
                btn.disabled = false;
                btn.textContent = 'вңЁ ејҖе§Ӣз”ҹжҲҗ';
            }
        }

        async function saveSettings() {
            const key = document.getElementById('cfgKey').value;
            const url = document.getElementById('cfgUrl').value;
            const model = document.getElementById('cfgModel').value;
            const port = document.getElementById('cfgPort').value;
            try {
                const res = await api('POST', '/api/config/update', {
                    ai_api_key: key || undefined,
                    ai_api_base_url: url || undefined,
                    ai_model: model || undefined,
                    port: port || undefined
                });
                toast('й…ҚзҪ®е·ІдҝқеӯҳеҲ° .env ж–Үд»¶пјҢзӮ№гҖҢйҮҚеҗҜжңҚеҠЎгҖҚз”ҹж•Ҳ', 'вң…');
            } catch(e) {
                toast('дҝқеӯҳеӨұиҙҘпјҡ' + e.message, 'вқҢ');
            }
        }

        async function loadPrompts() {
            const el = document.getElementById('promptEditor');
            if (!el) return;
            try {
                const prompts = await api('GET', '/api/ai/prompts');
                if (!Array.isArray(prompts) || !prompts.length) { el.innerHTML = '<div class="loading">жҡӮж— жҸҗзӨәиҜҚ</div>'; return; }
                const labels = { ai_assistant: 'рҹӨ– AIеҠ©жүӢ / AIе’ЁиҜў', ai_generate: 'рҹ“қ з”ҹжҲҗйўҳзӣ® / з”ҹжҲҗж–°йўҶеҹҹ', ai_error_analysis: 'рҹ”Қ й”ҷиҜҜеҲҶжһҗ' };
                const descs = {
                    ai_assistant: 'жҺ§еҲ¶ AI еҠ©жүӢе’ҢеҜ№иҜқзҡ„еӣһзӯ”йЈҺж ј',
                    ai_generate: 'жҺ§еҲ¶з”ҹжҲҗйқўиҜ•йўҳж—¶зҡ„еӣһзӯ”йЈҺж јпјҢ{domain} дјҡиҮӘеҠЁжӣҝжҚўдёәйўҶеҹҹеҗҚз§°',
                    ai_error_analysis: 'жҺ§еҲ¶зӯ”й”ҷж—¶й”ҷиҜҜеҲҶжһҗзҡ„иҜӯж°”'
                };
                el.innerHTML = prompts.map(p => `
                    <div class="cfg-item" style="margin-bottom:10px;">
                        <label style="font-weight:600;">${labels[p.key] || p.key}</label>
                        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">${descs[p.key] || ''}</div>
                        <textarea id="prompt-${p.key}" style="width:100%;min-height:60px;padding:8px;border:1px solid var(--border-color);border-radius:6px;font-size:13px;font-family:inherit;background:var(--input-bg);color:var(--text-primary);resize:vertical;">${p.value.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
                    </div>
                `).join('');
            } catch(e) {
                if (el) el.innerHTML = '<div style="color:var(--text-secondary);font-size:13px;">еҠ иҪҪеӨұиҙҘпјҡ' + e.message + '</div>';
            }
        }
        async function savePrompts() {
            const el = document.getElementById('promptEditor');
            if (!el) return;
            const textareas = el.querySelectorAll('textarea');
            let saved = 0, failed = 0;
            for (const ta of textareas) {
                const key = ta.id.replace('prompt-', '');
                const value = ta.value.trim();
                if (!value) continue;
                try {
                    await api('POST', '/api/ai/prompts', { key, value });
                    saved++;
                } catch(e) { failed++; }
            }
            if (failed) toast('дҝқеӯҳ ' + saved + ' дёӘжҲҗеҠҹпјҢ' + failed + ' дёӘеӨұиҙҘ', 'вҡ пёҸ');
            else toast('е·Ідҝқеӯҳ ' + saved + ' дёӘжҸҗзӨәиҜҚ', 'вң…');
        }

        async function restartService() {
            if (!confirm('зЎ®е®ҡиҰҒйҮҚеҗҜеҗҺз«ҜжңҚеҠЎеҗ—пјҹ')) return;
            try {
                await fetch(API_BASE + '/restart', { method: 'POST' });
                toast('жңҚеҠЎйҮҚеҗҜдёӯ...', 'рҹ”„');
                setTimeout(() => { window.location.reload(); }, 3000);
            } catch(e) {
                toast('йҮҚеҗҜиҜ·жұӮе·ІеҸ‘йҖҒпјҢйЎөйқўе°ҶиҮӘеҠЁеҲ·ж–°', 'рҹ”„');
                setTimeout(() => { window.location.reload(); }, 2000);
            }
        }

        // ---- еҲқе§ӢеҢ– ----
        applySavedTheme();
        (async () => {
            if (token) {
                try {
                    const p = JSON.parse(atob(token.split('.')[1]));
                    document.getElementById('username').textContent = p.username;
                    await loadDomains();
                    loadTab('practice');
                } catch(e) { logout(); }
            } else {
                document.getElementById('content').innerHTML =
                    '<div class="modal" id="loginModal" style="display:flex;background:none;position:static;">' +
                    '<div class="modal-content" id="aiModalContentBox"><h2>зҷ»еҪ• / жіЁеҶҢ</h2>' +
                    '<div class="form-group"><label>з”ЁжҲ·еҗҚ</label><input type="text" id="loginUsername" placeholder="иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚ" autocomplete="off"></div>' +
                    '<div class="form-group"><label>еҜҶз Ғ</label><input type="password" id="loginPassword" placeholder="иҜ·иҫ“е…ҘеҜҶз Ғ" autocomplete="off"></div>' +
                    '<div class="btn-group"><button class="btn btn-primary" onclick="doLogin()">зҷ»еҪ•</button><button class="btn btn-success" onclick="doRegister()">жіЁеҶҢ</button></div></div></div>';
            }
        })();

        // TTS иҜӯйҹіеҲ—иЎЁеҸҳеҢ–ж—¶жӣҙж–°йҖүжӢ©еҷЁ
        if (window.speechSynthesis) {
            window.speechSynthesis.addEventListener('voiceschanged', () => {
                const select = document.getElementById('aiVoiceSelect');
                if (select && select.style.display !== 'none') loadVoices();
            });
        }
    </script>
