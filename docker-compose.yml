services:
  app:
    container_name: java-eight-part-system
    build: .
    ports:
      - "7777:7777"
    environment:
      - TZ=Asia/Shanghai
      - JWT_SECRET=Aa123456@
      # AI 配置：可换成外部 API（如 NVIDIA、OpenAI）
      - AI_API_BASE_URL=${AI_API_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_API_KEY=${AI_API_KEY:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:7777/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
